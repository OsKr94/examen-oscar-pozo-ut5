name: CI/CD UT5 MarioDex

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  test-angular:
    name: Test Angular
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MarioAngular/MarioDex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: MarioAngular/MarioDex/package-lock.json

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Install dependencies
        run: npm ci

      - name: Run Angular tests
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Build Angular production
        run: npm run build -- --configuration production

  test-laravel:
    name: Test Laravel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MarioLaravel/MarioDex

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare app key
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Laravel tests
        run: php artisan test --testdox

  deploy-render:
    name: Deploy Render
    runs-on: ubuntu-latest
    needs: [test-angular, test-laravel]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy Frontend on Render
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Deploy Backend on Render
        run: |
          curl -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_BACKEND_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}'
